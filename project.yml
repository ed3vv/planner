name: Widget
options:
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  FocusApp:
    type: application
    platform: macOS
    sources:
      - path: WidgetHost
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eden.focusapp
        DEVELOPMENT_TEAM: "2M797FV46P"
        PRODUCT_NAME: FocusApp
        INFOPLIST_FILE: WidgetHost/Info.plist
        CODE_SIGN_ENTITLEMENTS: WidgetHost/WidgetHost.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
