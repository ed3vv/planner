name: Widget
options:
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.0.0"

targets:
  FocusApp:
    type: application
    platform: macOS
    sources:
      - path: WidgetHost
        type: group
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseCore
      - package: firebase-ios-sdk
        product: FirebaseFirestore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eden.focusapp
        DEVELOPMENT_TEAM: "2M797FV46P"
        PRODUCT_NAME: FocusApp
        INFOPLIST_FILE: WidgetHost/Info.plist
        CODE_SIGN_ENTITLEMENTS: WidgetHost/WidgetHost.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
